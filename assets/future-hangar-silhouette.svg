<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Original futuristic hangar with mecha silhouette</title>
  <desc id="desc">A cold cyan war-room hangar bay with an original non-branded mecha silhouette and maintenance gantries.</desc>
  <defs>
    <linearGradient id="bay" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f1922"/>
      <stop offset="0.55" stop-color="#071017"/>
      <stop offset="1" stop-color="#020609"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="1">
